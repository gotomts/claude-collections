# claude-collections の単一 release-drafter ワークフロー (ADR-0006)。
#
# 役割は 2 つ:
#   (A) drafter: main マージ後に各コレクションの draft Release を更新
#   (B) autolabeler: PR open/update 時に Conventional Commits prefix から
#       label (feat/fix/refactor/docs/test/chore) を自動付与
#
# drafter (push 起点):
#   1. discover ジョブが repo top-level を走査して
#      <dir>/.claude-plugin/plugin.json を持つ dir = コレクションと判定
#   2. matrix で各コレクションごとに draft ジョブを並列起動
#   3. draft ジョブはテンプレ config (.github/release-drafter-template.yml) の
#      {{COLLECTION}} を sed で実コレクション名に置換し、
#      .github/release-drafter-rendered-<collection>.yml として書き出して
#      release-drafter に渡す
#
# autolabeler (pull_request_target 起点):
#   - autolabeler ルールは collection 非依存なので discover 不要
#   - 同じテンプレ config をダミー collection 名で render して release-drafter に
#     `disable-releaser: true` で渡す (drafter 抑制、autolabeler のみ実行)
#   - pull_request_target は base 側 (main) のコードで実行されるので、
#     PR の HEAD コードを checkout せず main の template を使う (security)
#
# 利点:
#   - 新コレクション追加時に drafter config / workflow の手作業ゼロ
#     (<collection>/.claude-plugin/plugin.json が main に乗った時点で
#      次の push trigger で drafter が自動認識して動き出す)
#   - per-collection の drafter 設定不要 = 設定漏れ事故が構造的に発生しない
#   - autolabeler が PR open 時に動くので、Conventional Commits prefix がついた
#     PR は自動で label が付き、drafter が ✨ Features / 🐛 Fixes 等に
#     正しく分類できる (以前は label が付かず default の flat list だった)
#
# 前提: リポジトリ Settings → Actions → General → Workflow permissions を
#       "Read and write permissions" にしておく (contents: write +
#       pull-requests: write 用)。
#
# workflow_dispatch は設定修正後にドラフトを再生成したい時の手動再実行用。

name: Release Drafter

on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, reopened, synchronize, edited]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  autolabel:
    # PR 起点: autolabeler のみ実行 (drafter は disable-releaser で抑制)。
    # pull_request_target なので base (main) のコードで動く → PR の HEAD は
    # checkout しない (security)。autolabeler はラベル付与 = PR メタデータ操作のみ。
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Render template (autolabeler は COLLECTION 非依存だがテンプレ構文上必要)
        shell: bash
        run: |
          sed "s|{{COLLECTION}}|_autolabel_|g" \
            .github/release-drafter-template.yml \
            > .github/release-drafter-autolabel.yml
      - name: Run autolabeler
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter-autolabel.yml
          disable-releaser: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  discover:
    # main push or 手動再実行: コレクションを発見して draft ジョブへ matrix で渡す。
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    outputs:
      collections: ${{ steps.list.outputs.collections }}
      has_any: ${{ steps.list.outputs.has_any }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        name: Discover collections
        shell: bash
        run: |
          # top-level dir で .claude-plugin/plugin.json を持つもの = コレクション
          # (root の .claude-plugin/ は marketplace.json しか持たないので除外される)
          mapfile -t found < <(for dir in */; do
            d="${dir%/}"
            if [ -f "$d/.claude-plugin/plugin.json" ]; then
              printf '%s\n' "$d"
            fi
          done)

          if [ "${#found[@]}" -eq 0 ]; then
            echo "collections=[]" >> "$GITHUB_OUTPUT"
            echo "has_any=false" >> "$GITHUB_OUTPUT"
            echo "No collections discovered."
            exit 0
          fi

          json=$(printf '%s\n' "${found[@]}" | jq -R . | jq -s -c .)
          echo "collections=$json" >> "$GITHUB_OUTPUT"
          echo "has_any=true" >> "$GITHUB_OUTPUT"
          echo "Discovered: $json"

  draft:
    needs: discover
    if: github.event_name != 'pull_request_target' && needs.discover.outputs.has_any == 'true'
    strategy:
      fail-fast: false
      matrix:
        collection: ${{ fromJson(needs.discover.outputs.collections) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write     # draft Release の作成/更新
      pull-requests: read # release-drafter がノート生成のためマージ済み PR を読む
    env:
      COLLECTION: ${{ matrix.collection }}
    steps:
      - uses: actions/checkout@v4
      - name: Render config from template
        shell: bash
        run: |
          # COLLECTION は discover ジョブで filesystem の dir 名から取った値で
          # 本来は trusted だが、defense-in-depth として kebab-case 系の
          # 安全な文字 ([a-z0-9][a-z0-9_-]*) のみを許可する
          if ! [[ "${COLLECTION}" =~ ^[a-z0-9][a-z0-9_-]*$ ]]; then
            echo "::error::Invalid collection name '${COLLECTION}' — must match [a-z0-9][a-z0-9_-]*"
            exit 1
          fi
          rendered=".github/release-drafter-rendered-${COLLECTION}.yml"
          sed "s|{{COLLECTION}}|${COLLECTION}|g" \
            .github/release-drafter-template.yml \
            > "$rendered"
          echo "--- Rendered config for ${COLLECTION}:"
          cat "$rendered"
      - name: Run release-drafter
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter-rendered-${{ env.COLLECTION }}.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
