# PR で release-drafter の per-collection config が template + collection 一覧と
# 同期しているか検証する (ADR-0006)。
#
# drift 検知パターン:
#   - 新コレクション追加で対応する config が未生成
#   - 削除されたコレクションの config が残存
#   - template を編集したが再生成されていない
#   - per-collection config が手編集された
#
# どれかに該当すれば `make verify-drafter-configs` (内部で
# `scripts/regen-drafter-configs.sh --check`) が exit 1 で CI 失敗。
# ユーザは `make regen-drafter-configs` を実行して再生成した結果を commit すれば OK。

name: verify-drafter-configs

on:
  pull_request:
    paths:
      - '*/.claude-plugin/plugin.json'
      - '.github/release-drafter-*.yml'
      - '.github/workflows/release-drafter.yml'
      - '.github/workflows/verify-drafter-configs.yml'
      - 'scripts/regen-drafter-configs.sh'
      - 'Makefile'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Verify drafter configs sync
        run: make verify-drafter-configs
