# !!! GENERATED FILE — DO NOT EDIT !!!
# Source: .github/release-drafter-template.yml
# Regenerate: make regen-drafter-configs
# release-drafter のテンプレ config (ADR-0006 / ADR-0007)。
#
# `scripts/regen-drafter-configs.sh` (Makefile target: `regen-drafter-configs`)
# が本テンプレの indie-studio を実際の名前に置換し、
# `.github/release-drafter-<collection>.yml` を生成して commit する。
# 生成された config は release-drafter@v6 が default branch (main) から
# API 経由で読む (本仕組みは ADR-0006 Revised 節を参照)。
#
# 編集の影響範囲: 本テンプレを変更すると全コレクションの drafter 挙動が変わる。
# 変更後は `make regen-drafter-configs` を実行して全 per-collection config を
# 更新し、まとめて commit する。CI (`verify-drafter-configs`) が drift を
# 検知して fail するので、忘れたら気づける。
#
# コレクション固有のカスタマイズが必要になった時点で本 ADR を extends する形で
# 「特定コレクションだけ override」の仕組み (例: <collection>/.release-drafter.yml
#  を見て merge) を検討する。

name-template: "indie-studio/v$RESOLVED_VERSION"
tag-template: "indie-studio/v$RESOLVED_VERSION"

# release-drafter@v6 は既存 draft / last release を tag-prefix で filter して探す
# (findPreviousReleases)。未設定だと matrix の各 collection job が「repo 内で最初に
# 見つかった draft」を取り違えて上書きし合う draft race が起きる (ADR-0007 / issue #22)。
# collection ごとに固有 prefix を与えて draft 探索を隔離する。
# prefix strip 後 (例 "indie-studio/v0.0.4" → "0.0.4") は正しい semver として version 解決される。
tag-prefix: "indie-studio/v"

# indie-studio/ 配下と vendoring 元 (shared/skills/finish-stage-pr) に
# 触れた PR のみ集約。collection 間の draft 漏れを構造的に隔離。
# 将来、共有 skill が増えたら本セクションを (テンプレ全体ではなく)
# collection ごとの override 機構で吸収する。
include-paths:
  - "indie-studio/"
  - "shared/skills/finish-stage-pr/"

categories:
  - title: "✨ Features"
    labels: ["feat"]
  - title: "🐛 Fixes"
    labels: ["fix"]
  - title: "♻️ Refactor"
    labels: ["refactor"]
  - title: "📝 Docs"
    labels: ["docs"]
  - title: "✅ Tests"
    labels: ["test"]
  - title: "🔧 Chore"
    labels: ["chore"]

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

# テスト期 (現在): 全 label patch 固定で v0.0.x 系厳守
# 安定化フェーズで本セクションを feat→minor / major→major に書き換え
# (ADR-0004 を extends する新 ADR で切替判断)
version-resolver:
  patch:
    labels: ["feat", "fix", "refactor", "docs", "test", "chore", "major"]
  default: patch

# Conventional Commits prefix から自動 label 付与
autolabeler:
  - label: "feat"
    title:
      - "/^feat(\\(.+\\))?:/"
  - label: "fix"
    title:
      - "/^fix(\\(.+\\))?:/"
  - label: "refactor"
    title:
      - "/^refactor(\\(.+\\))?:/"
  - label: "docs"
    title:
      - "/^docs(\\(.+\\))?:/"
  - label: "test"
    title:
      - "/^test(\\(.+\\))?:/"
  - label: "chore"
    title:
      - "/^chore(\\(.+\\))?:/"

template: |
  ## 変更点

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...indie-studio/v$RESOLVED_VERSION
